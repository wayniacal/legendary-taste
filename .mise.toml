# Pinned toolchains. `mise install` sets up everything. Uncomment what the
# repo uses; pin minor versions, bump deliberately.
# mise also owns per-directory env vars (no direnv) and installs jj + just.
[tools]
just = "1"
jj = "0.42"
# rust = "1.87"
# node = "22.16"
# python = "3.12"
# uv = "0.10"
# pnpm = "10"
# "aqua:google/osv-scanner" = "2"   # `just audit` (cross-ecosystem lockfile scanner)
# "aqua:gitleaks/gitleaks" = "8"    # `just audit` (secret-leak scan, --redact)

[env]
# FOO = "bar"
_.file = { path = ".env.local", redact = true }
