# CI is the same contract as local: just check && just test. If they pass
# here but not on your machine (or vice versa), the toolchain pin is wrong.
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    # the kit's own repo is marked as a template and its verbs are exit-1
    # stubs by design; CI only means something once a project wires them
    if: ${{ !github.event.repository.is_template }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2   # installs everything in .mise.toml
      # Deps install from the lockfile only — never re-resolve. A drifted or
      # swapped dependency fails here instead of shipping. Each step is a no-op
      # when its lockfile is absent, so the same CI serves every lane.
      - run: pnpm install --frozen-lockfile
        if: ${{ hashFiles('pnpm-lock.yaml') != '' }}
      - run: uv sync --locked
        if: ${{ hashFiles('uv.lock') != '' }}
      - run: cargo fetch --locked
        if: ${{ hashFiles('Cargo.lock') != '' }}
      - run: just check
      - run: just test
      - run: just audit
